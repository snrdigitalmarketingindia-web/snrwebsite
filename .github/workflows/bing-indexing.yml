name: Bing URL Indexing

on:
  push:
    branches: [ main ]
    paths:
      - '**.html'
      - 'public/sitemap.xml'
      - 'app/**/*.tsx'
      - 'app/**/*.ts'
  workflow_dispatch:   # allow manual trigger from GitHub Actions UI

jobs:
  bing-submit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Set up Python
        uses: actions/setup-python@v5
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r bing-indexing/requirements.txt

      - name: Submit URLs to Bing + IndexNow
        env:
          BING_API_KEY: ${{ secrets.BING_API_KEY }}
          SITE_URL: "https://www.snrdigitalmarketing.com"
          SITEMAP_URL: "https://www.snrdigitalmarketing.com/sitemap.xml"
        run: python bing-indexing/submit_sitemap_urls.py
